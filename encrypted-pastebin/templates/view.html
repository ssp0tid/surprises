<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Paste - Encrypted Pastebin</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            width: 100%;
            max-width: 900px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
        }

        h1 {
            font-size: 1.25rem;
            font-weight: 600;
            color: #c9d1d9;
        }

        .actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 0.9rem;
            text-decoration: none;
            transition: background 0.2s ease;
        }

        .btn-primary {
            background: #238636;
            color: #ffffff;
        }

        .btn-primary:hover {
            background: #2ea043;
        }

        .btn-secondary {
            background: #21262d;
            color: #c9d1d9;
            border: 1px solid #30363d;
        }

        .btn-secondary:hover {
            background: #30363d;
        }

        .content-box {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            overflow: hidden;
        }

        .content-header {
            background: #21262d;
            padding: 12px 16px;
            border-bottom: 1px solid #30363d;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .content-label {
            font-size: 0.85rem;
            color: #8b949e;
        }

        .burn-notice {
            font-size: 0.85rem;
            color: #d29922;
        }

        .content-body {
            padding: 20px;
            overflow-x: auto;
        }

        pre {
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            font-size: 14px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-wrap: break-word;
            color: #c9d1d9;
        }

        .warning {
            background: rgba(187, 128, 9, 0.15);
            border: 1px solid #d29922;
            border-radius: 6px;
            padding: 16px;
            margin-top: 20px;
            color: #d29922;
            font-size: 0.9rem;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Encrypted Paste</h1>
            <div class="actions">
                <a href="{{ url_for('raw', paste_id=paste_id) }}" class="btn btn-secondary">Raw</a>
                <a href="{{ url_for('index') }}" class="btn btn-primary">New Paste</a>
            </div>
        </div>

        <div class="content-box">
            <div class="content-header">
                <span class="content-label">Decrypted Content</span>
            </div>
            <div class="content-body">
                <pre>{{ content }}</pre>
            </div>
        </div>

        {% if will_burn %}
        <div class="warning">
            This paste has been destroyed. You will not be able to view it again.
        </div>
        {% endif %}
    </div>
</body>
</html>
