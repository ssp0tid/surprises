<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f1f5f9; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center">
    <div class="text-center">
        <div class="text-8xl mb-4">404</div>
        <h1 class="text-3xl font-bold mb-2">Page Not Found</h1>
        <p class="text-dark-400 mb-8">The page you're looking for doesn't exist.</p>
        <a href="{{ url_for('index') }}" class="px-6 py-3 bg-amber-500 text-slate-900 rounded font-semibold hover:bg-amber-600">
            Go Home
        </a>
    </div>
</body>
</html>
