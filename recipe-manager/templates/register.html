{% extends "layout.html" %}

{% block title %}Register - Recipe Manager{% endblock %}

{% block content %}
<div class="container mx-auto px-4 py-8">
    <div class="max-w-md mx-auto">
        <div class="card rounded-lg p-8">
            <h1 class="text-2xl font-bold text-center mb-6">Register</h1>
            
            <form method="POST" class="space-y-4">
                <div>
                    <label for="username" class="block text-sm font-medium mb-2">Username</label>
                    <input type="text" id="username" name="username" required minlength="3" maxlength="80"
                           class="input-field w-full px-4 py-2 rounded" placeholder="chef123">
                </div>
                
                <div>
                    <label for="email" class="block text-sm font-medium mb-2">Email</label>
                    <input type="email" id="email" name="email" required
                           class="input-field w-full px-4 py-2 rounded" placeholder="you@example.com">
                </div>
                
                <div>
                    <label for="password" class="block text-sm font-medium mb-2">Password</label>
                    <input type="password" id="password" name="password" required minlength="8"
                           class="input-field w-full px-4 py-2 rounded" placeholder="••••••••">
                    <p class="text-dark-400 text-xs mt-1">Must be at least 8 characters</p>
                </div>
                
                <div>
                    <label for="confirm_password" class="block text-sm font-medium mb-2">Confirm Password</label>
                    <input type="password" id="confirm_password" name="confirm_password" required
                           class="input-field w-full px-4 py-2 rounded" placeholder="••••••••">
                </div>
                
                <button type="submit" class="btn-primary w-full py-3 rounded font-semibold">
                    Create Account
                </button>
            </form>
            
            <p class="text-center text-dark-400 mt-6">
                Already have an account? 
                <a href="{{ url_for('login') }}" class="text-accent-500 hover:text-accent-600">Login</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
